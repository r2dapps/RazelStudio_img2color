<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Razel Studio — Premium AI Paint</title>
  <meta name="description" content="Premium AI wall paint visualizer. Automatically detect walls and refine with interactive smart segmentation.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="img2color.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

<body data-theme="dark">

  <!-- PREMIUM SPLASH SCREEN -->
  <div class="splash-screen" id="splash-screen">
    <div class="splash-logo">Razel Studio</div>
    <div class="splash-loader-wrap">
      <div class="splash-status-txt" id="splash-status-txt">Booting Neural Engine</div>
      <div class="splash-bar-bg">
        <div class="splash-bar-fill" id="splash-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="shell">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-mark">Razel Studio</span>
      </div>
      <div class="header-actions">
        <button class="hdr-btn hdr-btn-icon" onclick="toggleTheme()" id="btn-theme" title="Toggle Theme">☀</button>
        <button class="hdr-btn hdr-btn-icon" onclick="toggleFullscreen()" id="btn-fs" title="Fullscreen">⛶</button>
        <div class="dl-group">
          <button class="hdr-btn dl-main" id="btn-download" onclick="downloadImage()">⬇ Download</button>
          <button class="hdr-btn dl-compare" id="btn-compare-dl" onclick="downloadSideBySide()">⇆ Compare</button>
        </div>
      </div>
    </header>

    <div class="body">
      <!-- WORKSPACE -->
      <div class="workspace">
        <div class="canvas-zone" id="canvas-zone">
          <!-- Drop Zone -->
          <div class="drop-zone" id="drop-zone">
            <div class="drop-icon-wrap">🏠</div>
            <div class="drop-title">Drop Your Room Photo</div>
            <p class="drop-sub">AI automatically segments your walls. Click any surface to paint.</p>
            <div class="drop-actions">
              <button class="btn-upload" onclick="document.getElementById('file-input').click()">📁 Choose Photo</button>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
          </div>

          <!-- Canvas Layers -->
          <div id="canvas-inner" style="display:none">
            <canvas id="main-canvas"></canvas>
            <canvas id="paint-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
            <div class="ba-slider" id="ba-slider" style="display:none">
              <canvas id="ba-canvas"></canvas>
              <div class="ba-divider" id="ba-divider"><div class="ba-handle">↔️</div></div>
            </div>
          </div>

          <!-- Floating Toolbar (Left) -->
          <div class="toolbar" id="toolbar" style="display:none">
            <div class="tg">
               <button class="tbtn active" id="tbtn-sam-add" onclick="setTool('sam-add')" title="Add Wall Area">➕</button>
               <button class="tbtn" id="tbtn-sam-sub" onclick="setTool('sam-sub')" title="Exclude Object">➖</button>
               <button class="tbtn" id="tbtn-flood" onclick="setTool('flood')" title="Flood Fill">🪣</button>
               <button class="tbtn" id="tbtn-eye" onclick="setTool('eyedrop')" title="Pick Color">🔬</button>
               <button class="tbtn" onclick="clearAll()" title="Reset All">↺</button>
               <button class="tbtn" onclick="toggleBeforeAfter()" title="Compare">⇆</button>
            </div>
          </div>
        </div>
      </div>

      <!-- FLOATING PANEL (Right) -->
      <div class="panel" id="panel" style="display:none">
        
        <!-- AUTO-WALL SECTION -->
        <div class="sec">
          <div class="sec-title">✦ Smart Actions</div>
          <button class="tbtn ai" onclick="runAISegmentation()" style="width:100%; justify-content:center; background:rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.3); color:#a78bfa; margin-bottom:12px;">
            🤖 Auto-Detect Walls
          </button>
          
          <div class="sam-status-card" style="background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; border:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div id="sam-status-icon">✦</div>
                <div id="sam-status-title" style="font-weight:700; font-size:0.8rem;">AI ENGINE READY</div>
            </div>
            <div id="sam-status-sub" style="font-size:0.7rem; color:var(--sub); margin-bottom:8px;">Smart masking active</div>
            <div class="sam-prog-wrap" id="sam-prog-wrap" style="height:4px; background:rgba(0,0,0,0.2); border-radius:10px; overflow:hidden; display:none;">
                <div class="sam-prog-bar" id="sam-prog-bar" style="width:0%; height:100%; background:var(--accent); transition:width 0.3s;"></div>
            </div>
          </div>
        </div>

        <div class="divider" style="height:1px; background:var(--border); margin:0 16px;"></div>

        <!-- COLOR SECTION -->
        <div class="sec">
          <div class="sec-title">🎨 Premium Palette</div>
          <div class="active-color-row" style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <div id="csb" style="width:48px; height:48px; border-radius:12px; background:#ff4d6d; position:relative; overflow:hidden;">
              <input type="color" id="color-input-real" style="position:absolute; inset:-10px; cursor:pointer;" value="#ff4d6d" oninput="setColor(this.value,'Custom')">
            </div>
            <div style="flex:1">
              <input type="text" class="hex-input" id="chex" style="background:transparent; border:none; color:var(--text); font-weight:800; font-size:1.1rem; width:100%" value="#FF4D6D" onchange="setColor(this.value, 'Custom')">
              <div id="cname" style="font-size:0.7rem; color:var(--sub);">Coral Rouge</div>
            </div>
          </div>
          <div class="palette" id="palette" style="display:grid; grid-template-columns:repeat(6, 1fr); gap:6px;"></div>
        </div>

        <!-- SETTINGS SECTION -->
        <div class="sec">
           <div class="srow" style="margin-bottom:12px;">
             <label style="font-size:0.7rem; color:var(--sub);">OPACITY</label>
             <input type="range" id="sl-op" min="20" max="100" value="80" oninput="onOp(this.value)" style="width:100%">
           </div>
           <div class="srow">
             <label style="font-size:0.7rem; color:var(--sub);">SHADOW BLEND</label>
             <input type="range" id="sl-bl" min="0" max="100" value="35" oninput="onBl(this.value)" style="width:100%">
           </div>
        </div>

        <!-- ADVANCED DROP (Phase 3 requirement) -->
        <div class="adv-toggle" onclick="toggleAdvancedSettings()">
            <span>ADVANCED CONTROLS</span>
            <span id="adv-icon">▼</span>
        </div>
        <div class="adv-content">
            <div class="srow" style="margin-top:10px;">
                <label style="font-size:0.6rem;">EDGE SOFTNESS</label>
                <input type="range" min="0" max="10" value="2" style="width:100%">
            </div>
            <div class="srow" style="margin-top:10px;">
                <label style="font-size:0.6rem;">FLOOD TOLERANCE</label>
                <input type="range" min="1" max="100" value="25" style="width:100%">
            </div>
        </div>

        <div style="flex:1"></div>

        <button class="apply-btn" id="apply-btn" onclick="redrawPaint()" style="margin:16px; background:var(--accent); color:white; border:none; padding:14px; border-radius:12px; font-weight:800; cursor:pointer;">
          APPLY CHANGES
        </button>

      </div>
    </div>
    
    <!-- STATUS BAR -->
    <div id="status-bar" style="position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-top:1px solid var(--border); padding:4px 20px; font-size:0.6rem; color:var(--sub); display:flex; justify-content:space-between; z-index:500;">
       <div id="status-txt">Welcome to Razel Studio</div>
       <div>V3.0 PRODUCTION</div>
    </div>
  </div>

  <!-- Stub elements for code compatibility -->
  <div style="display:none">
    <div id="sam-prog-wrap-dummy"></div>
    <div id="ai-status"></div>
    <div id="recent-row"></div>
    <div id="recent-swatches"></div>
    <div id="preset-tex-grid"></div>
    <div id="sl-tex-scale"></div>
    <div id="tex-preview"></div>
    <div id="tex-name"></div>
    <div id="finish-chips"></div>
    <div id="shortcuts-overlay"></div>
  </div>

  <script src="img2color.js"></script>
</body>
</html>
